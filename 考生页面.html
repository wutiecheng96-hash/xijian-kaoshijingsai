let paper = {single:[], multiple:[], short:[]};
let userAns = {};
let userName = "";

function pick(arr,n){
  return [...arr].sort(()=>Math.random()-0.5).slice(0,n);
}

function genPaper(){
  paper.single = pick(bank.single,12);
  paper.multiple = pick(bank.multiple,7);
  paper.short = pick(bank.short,1);
}

function render(){
  let html = ""; let qid=0;
  html += `<h3>一、单选题（12题×5分）</h3>`;
  paper.single.forEach(q=>{
    qid++;
    html += `<div class="question" id="Q${qid}"><p>${qid}.${q.title}</p><div class="options">`;
    ["A","B","C","D"].forEach((k,i)=>{
      if(q.options[i]) html+=`<div class="opt" onclick="selS(${qid},'${k}')">${k}.${q.options[i]}</div>`;
    });
    html += `</div></div>`;
  });

  html += `<h3>二、多选题（7题×8分）</h3>`;
  paper.multiple.forEach(q=>{
    qid++;
    html += `<div class="question" id="Q${qid}"><p>${qid}.${q.title}</p><div class="options">`;
    ["A","B","C","D"].forEach((k,i)=>{
      if(q.options[i]) html+=`<div class="opt" onclick="selM(${qid},'${k}')">${k}.${q.options[i]}</div>`;
    });
    html += `</div></div>`;
  });

  html += `<h3>三、简答题（20分）</h3>`;
  qid++;
  html += `<div class="question"><p>${qid}.${paper.short[0].title}</p><textarea id="Q${qid}"></textarea></div>`;
  document.getElementById("paper").innerHTML = html;
}

function selS(qid,v){
  document.querySelectorAll(`#Q${qid} .opt`).forEach(o=>o.classList.remove("selected"));
  event.target.classList.add("selected");
  userAns[qid] = v;
}

function selM(qid,v){
  event.target.classList.toggle("selected");
  if(!userAns[qid]) userAns[qid] = "";
  userAns[qid] = userAns[qid].includes(v) ? userAns[qid].replace(v,"") : userAns[qid]+v;
}

document.getElementById("startBtn").onclick = ()=>{
  userName = document.getElementById("userName").value.trim();
  if(!userName){alert("请输入姓名");return}
  genPaper();
  render();
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("paper").style.display = "block";
  document.getElementById("submitBtn").style.display = "block";
};

document.getElementById("submitBtn").onclick = async ()=>{
  let score = 0;
  let qid = 0;
  let shortAns = document.getElementById(`Q${20}`).value.trim() || "未作答";
  let shortScore = shortAns ? 20 : 0;

  paper.single.forEach(q=>{
    qid++;
    let u = userAns[qid] || "";
    if(u === q.answer) score +=5;
  });

  paper.multiple.forEach(q=>{
    qid++;
    let u = [...(userAns[qid]||"")].sort().join("");
    let a = [...q.answer].sort().join("");
    if(u === a) score +=8;
  });

  score += shortScore;

  const record = {
    name:userName,
    time:new Date().toLocaleString(),
    single:paper.single,
    multiple:paper.multiple,
    short:paper.short[0],
    userAns:userAns,
    shortText:shortAns,
    shortScore:shortScore,
    total:score
  };

  try {
    const res = await fetch("https://exam-api.deno.dev/submit", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(record)
    });
    if(!res.ok) throw new Error("提交失败");
  } catch(e){
    console.log(e);
  }

  let res = `<h2>${userName} 考试完成</h2>`;
  res += `<h1 style="color:#1890ff; font-size:42px; margin:20px 0">总分：${score} 分</h1>`;
  document.getElementById("result").innerHTML = res;
  document.getElementById("result").style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
};
</script>
</body>
</html>
